<!DOCTYPE html>
<html>
<head>
<title>Admin Spy Panel</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

h1{
text-align:center;
background:#222;
padding:10px;
}

.container{
display:flex;
height:90vh;
}

.sidebar{
width:30%;
background:#1a1a1a;
overflow-y:auto;
}

.user{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

.user:hover{
background:#333;
}

.chat{
flex:1;
background:black;
padding:10px;
overflow-y:auto;
}

.msg{
margin:5px 0;
padding:6px;
background:#eee;
color:black;
border-radius:5px;
}

</style>
</head>

<body>

<h1>ADMIN SPY MODE</h1>

<div class="container">

<div class="sidebar" id="chatList"></div>

<div class="chat" id="chatBox"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
getFirestore,
collection,
query,
orderBy,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const chatList=document.getElementById("chatList");
const chatBox=document.getElementById("chatBox");

/* LOAD ALL CHATS */

onSnapshot(collection(db,"chats"),(snap)=>{

chatList.innerHTML="";

snap.forEach(docu=>{

const div=document.createElement("div");

div.className="user";
div.innerText=docu.id;

div.onclick=()=>watchChat(docu.id);

chatList.appendChild(div);

});

});

function watchChat(chatID){

const q=query(
collection(db,"chats",chatID,"messages"),
orderBy("time")
);

onSnapshot(q,(snap)=>{

chatBox.innerHTML="";

snap.forEach(d=>{

const m=d.data();

const div=document.createElement("div");
div.className="msg";

div.innerText=m.sender+" : "+m.text;

chatBox.appendChild(div);

});

});

}

</script>

</body>
</html>
