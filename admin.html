
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Admin Chat Monitor</h2>

<div id="allChats"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collectionGroup, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

export const firebaseConfig = {
apiKey: "AIzaSyAxt94UyMn8AP8PFaSHPJ29JnZQ2KI3kZw",
authDomain: "chatgithub-e838d.firebaseapp.com",
projectId: "chatgithub-e838d",
storageBucket: "chatgithub-e838d.firebasestorage.app",
messagingSenderId: "755589384017",
appId: "1:755589384017:web:6af4c6d223d646cf36f570"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const chatDiv = document.getElementById("allChats");

const q = collectionGroup(db,"messages");

onSnapshot(q,(snap)=>{

chatDiv.innerHTML="";

snap.forEach(doc=>{

const m = doc.data();

const div = document.createElement("div");

div.className="adminMsg";

div.innerText = m.sender + " : " + m.text;

chatDiv.appendChild(div);

});

});

</script>

</body>
</html>
