
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Admin Chat Monitor</h2>

<div id="allChats"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collectionGroup, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_PROJECT.appspot.com",
messagingSenderId: "YOUR_SENDER_ID",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const chatDiv = document.getElementById("allChats");

const q = collectionGroup(db,"messages");

onSnapshot(q,(snap)=>{

chatDiv.innerHTML="";

snap.forEach(doc=>{

const m = doc.data();

const div = document.createElement("div");

div.className="adminMsg";

div.innerText = m.sender + " : " + m.text;

chatDiv.appendChild(div);

});

});

</script>

</body>
</html>
