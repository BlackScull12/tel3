<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Admin Panel</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

h1{
text-align:center;
background:#222;
padding:12px;
margin:0;
}

.container{
display:flex;
height:90vh;
}

/* USERS */

.usersPanel{
width:30%;
background:#1a1a1a;
overflow-y:auto;
border-right:1px solid #333;
}

.userRow{
padding:12px;
border-bottom:1px solid #333;
}

.userRow button{
margin-top:5px;
margin-right:5px;
}

/* CHAT */

.chatPanel{
flex:1;
display:flex;
flex-direction:column;
}

.chatHeader{
background:#222;
padding:10px;
border-bottom:1px solid #333;
}

.chatArea{
flex:1;
overflow-y:auto;
padding:15px;
background:black;
}

.msg{
margin:6px 0;
padding:8px;
border-radius:6px;
max-width:70%;
}

.sender{
background:#4caf50;
align-self:flex-end;
}

.receiver{
background:#555;
}

</style>

</head>


<body>

<h1>ADMIN PANEL</h1>

<div class="container">

<div class="usersPanel" id="usersPanel"></div>

<div class="chatPanel">

<div class="chatHeader" id="chatTitle">
Select a user to view chats
</div>

<div class="chatArea" id="chatArea"></div>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
query,
orderBy,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";


/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyAxt94UyMn8AP8PFaSHPJ29JnZQ2KI3kZw",
authDomain: "chatgithub-e838d.firebaseapp.com",
projectId: "chatgithub-e838d",
storageBucket: "chatgithub-e838d.firebasestorage.app",
messagingSenderId: "755589384017",
appId: "1:755589384017:web:6af4c6d223d646cf36f570"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* DOM */

const usersPanel = document.getElementById("usersPanel");
const chatArea = document.getElementById("chatArea");
const chatTitle = document.getElementById("chatTitle");


/* LOAD USERS */

async function loadUsers(){

usersPanel.innerHTML="";

const snap = await getDocs(collection(db,"users"));

snap.forEach(docu=>{

const user = docu.data();
const uid = docu.id;

const div = document.createElement("div");
div.className="userRow";

div.innerHTML = `
<b>${user.name}</b><br>

<button onclick="viewChats('${uid}','${user.name}')">
View Chats
</button>

<button onclick="banUser('${uid}')">
Ban
</button>

<button onclick="unbanUser('${uid}')">
Unban
</button>
`;

usersPanel.appendChild(div);

});

}

loadUsers();


/* VIEW CHATS */

window.viewChats = async function(uid,name){

chatTitle.innerText = "Chats of " + name;
chatArea.innerHTML="Loading chats...";

/* get all chats */

const chatsSnap = await getDocs(collection(db,"chats"));

chatArea.innerHTML="";

chatsSnap.forEach(chatDoc=>{

const chatID = chatDoc.id;

/* check if user part of chat */

if(!chatID.includes(uid)) return;

const chatBlock = document.createElement("div");
chatBlock.innerHTML=`<h3>Conversation: ${chatID}</h3>`;

chatArea.appendChild(chatBlock);

/* listen messages */

const q = query(
collection(db,"chats",chatID,"messages"),
orderBy("time")
);

onSnapshot(q,(snap)=>{

chatBlock.innerHTML=`<h3>Conversation: ${chatID}</h3>`;

snap.forEach(docu=>{

const msg = docu.data();

const div = document.createElement("div");

div.className="msg";

div.innerHTML =
"<b>"+msg.sender+"</b>: "+msg.text;

chatBlock.appendChild(div);

});

});

});

};


/* BAN USER */

window.banUser = async function(uid){

await updateDoc(doc(db,"users",uid),{
banned:true
});

alert("User banned");

};


/* UNBAN USER */

window.unbanUser = async function(uid){

await updateDoc(doc(db,"users",uid),{
banned:false
});

alert("User unbanned");

};

</script>

</body>
</html>
