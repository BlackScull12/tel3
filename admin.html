<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

h1{
text-align:center;
padding:15px;
background:#222;
margin:0;
}

.adminContainer{
display:flex;
height:90vh;
}

.usersPanel{
width:30%;
background:#1a1a1a;
overflow-y:auto;
border-right:1px solid #333;
}

.userRow{
padding:12px;
border-bottom:1px solid #333;
cursor:pointer;
}

.userRow:hover{
background:#2a2a2a;
}

.chatPanel{
flex:1;
display:flex;
flex-direction:column;
}

.chatHeader{
padding:12px;
background:#222;
border-bottom:1px solid #333;
font-weight:bold;
}

.chatArea{
flex:1;
overflow-y:auto;
padding:15px;
background:black;
display:flex;
flex-direction:column;
}

.msg{
padding:8px;
margin:4px 0;
border-radius:6px;
max-width:60%;
}

.sender{
background:white;
color:black;
align-self:flex-end;
}

.receiver{
background:pink;
color:black;
align-self:flex-start;
}

.controls{
margin-top:6px;
}

button{
padding:4px 8px;
margin-right:5px;
cursor:pointer;
}

</style>
</head>


<body>

<h1>Admin Panel</h1>

<div class="adminContainer">

<!-- USERS -->
<div class="usersPanel" id="usersPanel"></div>

<!-- CHAT -->
<div class="chatPanel">

<div class="chatHeader" id="chatTitle">
Select a user to view chats
</div>

<div class="chatArea" id="chatArea"></div>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
query,
collectionGroup,
where,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyAxt94UyMn8AP8PFaSHPJ29JnZQ2KI3kZw",
authDomain: "chatgithub-e838d.firebaseapp.com",
projectId: "chatgithub-e838d",
storageBucket: "chatgithub-e838d.firebasestorage.app",
messagingSenderId: "755589384017",
appId: "1:755589384017:web:6af4c6d223d646cf36f570"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


const usersPanel = document.getElementById("usersPanel");
const chatArea = document.getElementById("chatArea");
const chatTitle = document.getElementById("chatTitle");

let selectedUser = null;


/* LOAD USERS */

async function loadUsers(){

usersPanel.innerHTML="";

const snap = await getDocs(collection(db,"users"));

snap.forEach(docu=>{

const user = docu.data();
const uid = docu.id;

const div = document.createElement("div");
div.className="userRow";

div.innerHTML = `
<b>${user.name}</b>
<div class="controls">
<button onclick="viewChats('${uid}','${user.name}')">View Chats</button>
<button onclick="banUser('${uid}')">Ban</button>
<button onclick="unbanUser('${uid}')">Unban</button>
</div>
`;

usersPanel.appendChild(div);

});

}

loadUsers();


/* VIEW USER CHATS */

window.viewChats = function(uid,name){

selectedUser = uid;

chatTitle.innerText = "Chats of " + name;

chatArea.innerHTML="Loading...";

const q = query(
collectionGroup(db,"messages"),
where("sender","==",uid)
);

onSnapshot(q,(snap)=>{

chatArea.innerHTML="";

snap.forEach(docu=>{

const msg = docu.data();

const div = document.createElement("div");

div.className="msg sender";

div.innerText = msg.text;

chatArea.appendChild(div);

});

});

};


/* BAN USER */

window.banUser = async function(uid){

await updateDoc(doc(db,"users",uid),{
banned:true
});

alert("User banned");

};


/* UNBAN USER */

window.unbanUser = async function(uid){

await updateDoc(doc(db,"users",uid),{
banned:false
});

alert("User unbanned");

};

</script>

</body>
</html>
