<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat App</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- USERS LIST -->

<div id="usersList"></div>



<!-- CHAT AREA -->

<div id="chatArea">


<!-- CHAT HEADER -->

<div id="chatHeader">

<span id="chatUser">Select a user to chat</span>

<button id="nicknameBtn">✏ Nickname</button>

</div>



<!-- CHAT MESSAGES -->

<div id="chatBox"></div>



<!-- CHAT INPUT -->

<div id="chatInput">

<button id="emojiBtn" title="Emoji">😀</button>

<button id="gifBtn" title="GIF">GIF</button>

<input
id="messageInput"
type="text"
placeholder="Type a message..."
autocomplete="off"
/>

<button id="sendBtn">Send</button>

</div>



<!-- EMOJI PICKER -->

<div id="emojiPicker" style="display:none"></div>



<!-- GIF PICKER -->

<div id="gifPicker" style="display:none"></div>


</div>



<!-- EMOJI LIBRARY -->

<script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>



<!-- MAIN APP SCRIPT -->

<script type="module" src="app.js"></script>


</body>

</html>
