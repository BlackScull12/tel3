<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat</title>

<link rel="stylesheet" href="style.css">

<!-- EMOJI MART -->
<script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>

</head>

<body>


<!-- USERS LIST -->
<div id="usersList"></div>



<!-- CHAT AREA -->
<div id="chatArea">


<!-- CHAT HEADER -->
<div id="chatHeader">

<div class="headerLeft">

<span id="chatUser">Select a user</span>

<button id="nicknameBtn">✏️</button>

</div>


<div class="headerRight">

<!-- DARK MODE -->
<button id="themeToggle">🌙</button>


<!-- PROFILE -->
<div class="profileSection">

<img id="myProfilePic" class="profilePic" src="https://i.imgur.com/HeIi0wU.png">

<input type="file" id="profileUpload" accept="image/*" hidden>

<button id="uploadBtn">Upload</button>

</div>

</div>

</div>



<!-- PINNED MESSAGE BAR -->
<div id="pinnedBar" style="display:none">
📌 <span id="pinnedText"></span>
</div>



<!-- CHAT BOX -->
<div id="chatBox"></div>



<!-- CHAT INPUT -->
<div id="chatInput">

<button id="emojiBtn">😊</button>

<button id="gifBtn">GIF</button>

<input
id="messageInput"
type="text"
placeholder="Type a message..."
autocomplete="off"
/>

<button id="sendBtn">Send</button>


<!-- EMOJI PICKER -->
<div id="emojiPicker"></div>


<!-- GIF PICKER -->
<div id="gifPicker"></div>

</div>


</div>



<!-- FIREBASE + APP SCRIPT -->
<script type="module" src="app.js"></script>



<!-- SMALL FIX SCRIPT -->
<script>

/* UPLOAD BUTTON FIX */

const uploadBtn=document.getElementById("uploadBtn");
const profileUpload=document.getElementById("profileUpload");

uploadBtn.onclick=()=>{
profileUpload.click();
};


/* DARK MODE TOGGLE */

const toggle=document.getElementById("themeToggle");

toggle.onclick=()=>{

document.body.classList.toggle("dark");

if(document.body.classList.contains("dark")){
toggle.innerText="☀️";
localStorage.setItem("theme","dark");
}else{
toggle.innerText="🌙";
localStorage.setItem("theme","light");
}

};


/* LOAD SAVED THEME */

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark");
toggle.innerText="☀️";
}

</script>


</body>

</html>
